<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>System Login Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2E7D32",
              "neutral-bg": "#F8FAFB",
            },
            fontFamily: {
              "sans": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.375rem", "lg": "0.5rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style type="text/tailwindcss">
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        min-height: 100dvh;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-neutral-bg font-sans min-h-screen flex flex-col items-center justify-center">
<div class="w-full max-w-[480px] min-h-screen flex flex-col bg-white shadow-sm overflow-x-hidden relative">
<div class="flex items-center px-6 pt-12 pb-6">
<div class="flex-1">
<span class="material-symbols-outlined text-slate-400">arrow_back_ios</span>
</div>
<h2 class="text-slate-800 text-sm font-semibold uppercase tracking-widest text-center flex-[2]">System Authentication</h2>
<div class="flex-1"></div>
</div>
<div class="px-8 pt-4 flex flex-col items-center">
<div class="w-32 h-32 bg-center bg-no-repeat bg-contain" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCs6nCR4ICwY6xwh0EUQPNssQGfdPjvG5ZfLokGN5iuOdptY71iKgjL3KkjWetDjPs_LTDqWc0Q3OiD462N6eIm40EcuxZifcNL1R8zl73gEmAoHlQURRmpnIUYiwxnuHE_jkcntWE_iQKBII4cG3XOcpcTr7QTfC75yR2TXKtG5nQ3QulEDfbRDGk2pJruCPx9KkM0IOCxN6jPBlSZmsZuqqwe9XQ48Uzay3P5Wjlg0MTwHnDUB4eTnJj2t0hPnZ91jMlx-1J8jnOs");'>
</div>
<h1 class="text-slate-900 text-2xl font-bold mt-6 text-center">Biological Sprinkler System</h1>
<p class="text-slate-500 text-sm mt-2 text-center max-w-[280px]">AI-Powered Disease Detection &amp; Precision Agriculture Control</p>
</div>

<div id="errorMessage" class="hidden mx-8 mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded text-sm text-center">
    Invalid credentials. Please try again.
</div>

<form id="loginForm" class="px-8 mt-6 space-y-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 text-sm font-semibold ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input id="username" required class="w-full h-14 pl-12 pr-4 rounded-xl border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 placeholder:text-slate-400 border shadow-sm" placeholder="name@research.org" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-slate-700 text-sm font-semibold">Password</label>
<a class="text-primary text-xs font-bold hover:text-green-800" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input id="password" required class="w-full h-14 pl-12 pr-12 rounded-xl border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 placeholder:text-slate-400 border shadow-sm" placeholder="••••••••" type="password"/>
<button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button type="submit" class="w-full h-14 bg-primary text-white text-lg font-bold rounded-xl shadow-lg shadow-primary/30 hover:bg-green-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Login
                    <span class="material-symbols-outlined">login</span>
</button>
</div>
</form>
<div class="mt-8 px-8">
<div class="flex items-center gap-3">
<div class="h-[1px] flex-1 bg-slate-100"></div>
<span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Secure Credentials</span>
<div class="h-[1px] flex-1 bg-slate-100"></div>
</div>
<div class="flex justify-center gap-4 mt-6">
<button class="p-3 border border-slate-200 rounded-xl text-slate-600 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined">fingerprint</span>
</button>
<button class="p-3 border border-slate-200 rounded-xl text-slate-600 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined">face</span>
</button>
</div>
</div>
<div class="flex-1 min-h-[40px]"></div>
<footer class="p-8 text-center bg-slate-50 border-t border-slate-100">
<p class="text-slate-900 text-sm font-bold">
                Smart Agriculture using AI &amp; Image Processing
            </p>
<div class="flex items-center justify-center gap-2 mt-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<p class="text-slate-500 text-xs font-medium uppercase tracking-tighter">
                    In support of SDG 2: Zero Hunger
                </p>
</div>
</footer>
<div class="h-6 bg-slate-50"></div>
</div>

<script>
    function togglePassword() {
        const pwdInput = document.getElementById('password');
        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
        } else {
            pwdInput.type = 'password';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMessage = document.getElementById('errorMessage');
        
        // Allow any entry for demo purposes
        if (username && password) {
            localStorage.setItem('user', JSON.stringify({
                username: username,
                loginTime: new Date().toISOString()
            }));
            window.location.href = 'index.html';
        } else {
            errorMessage.classList.remove('hidden');
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 3000);
        }
    });
</script>
</body></html>
